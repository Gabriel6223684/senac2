{% extends "layouts/main.html" %}

{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-4 fw-semibold">
        <i class="fa-solid fa-user me-2 text-warning"></i>
        Cadastro de Usuário
    </h4>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <form id="user-form">
                <input type="hidden" id="id" name="id">
                <input type="hidden" id="action" name="action">
                <div class="row">
                    <div class="col-6">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="nome" name="nome" placeholder="example" required autofocus>
                            <label for="nome">Nome</label>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="user@exemplo.com" required>
                            <label for="email">Email</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha" required>
                            <label for="senha">Senha</label>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-check mt-3">
                            <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true" checked>
                            <label class="form-check-label" for="ativo">
                                Usuário ativo?
                            </label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="button" class="btn btn-warning d-flex align-items-center gap-2" id="insert">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Salvar Usuário
                        </button>
                    </div>
                </div>
            </form>

        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/user.js"></script>
{% endblock %}

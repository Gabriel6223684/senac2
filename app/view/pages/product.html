{% extends "layouts/main.html" %}

{% block title %}Novo Produto{% endblock %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-4 fw-semibold">
        <i class="fa-solid fa-box me-2 text-success"></i>
        Cadastro de Produto
    </h4>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <form id="product-form">

                <!-- Nome do Produto -->
                <div class="mb-3">
                    <label for="product-name" class="form-label fw-semibold">Nome do Produto</label>
                    <input type="text" class="form-control" id="product-name" placeholder="Digite o nome do produto"
                        required>
                    <div class="invalid-feedback">O nome é obrigatório.</div>
                </div>

                <!-- Preço -->
                <div class="mb-3">
                    <label for="product-price" class="form-label fw-semibold">Preço</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="number" step="0.01" min="0" class="form-control" id="product-price"
                            placeholder="0,00" required>
                    </div>
                    <div class="invalid-feedback">O preço é obrigatório e deve ser maior que zero.</div>
                </div>

                <!-- Categoria (opcional) -->
                <div class="mb-3">
                    <label for="product-category" class="form-label fw-semibold">Categoria</label>
                    <select class="form-select" id="product-category">
                        <option value="">Selecione uma categoria</option>
                        <option value="alimentos">Alimentos</option>
                        <option value="eletronicos">Eletrônicos</option>
                        <option value="moveis">Móveis</option>
                        <option value="roupas">Roupas</option>
                    </select>
                </div>

                <!-- Descrição (opcional) -->
                <div class="mb-3">
                    <label for="product-description" class="form-label fw-semibold">Descrição</label>
                    <textarea class="form-control" id="product-description" rows="3"
                        placeholder="Descrição do produto..."></textarea>
                </div>

                <!-- Botões -->
                <div class="d-flex gap-2 justify-content-end">
                    <button type="reset" class="btn btn-secondary">Limpar</button>
                    <button type="submit" class="btn btn-success d-flex align-items-center gap-2">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Salvar Produto
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
    const form = document.getElementById('product-form');

    form.addEventListener('submit', function (e) {
        e.preventDefault();

        // Validação simples
        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            return;
        }

        const product = {
            name: document.getElementById('product-name').value,
            price: parseFloat(document.getElementById('product-price').value),
            category: document.getElementById('product-category').value,
            description: document.getElementById('product-description').value
        };

        console.log('Produto cadastrado:', product);
        alert('Produto cadastrado com sucesso!');

        form.reset();
        form.classList.remove('was-validated');
    });
</script>

{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/pages/product.js"></script>
{% endblock %}

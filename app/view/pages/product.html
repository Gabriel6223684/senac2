{% extends "layouts/main.html" %}

{% block title %}Novo Produto{% endblock %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-4 fw-semibold">
        <i class="fa-solid fa-box me-2 text-success"></i>
        Cadastro de Produto
    </h4>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <form id="product-form">
                <input type="hidden" id="id" name="id">
                <input type="hidden" id="action" name="action">
                <div class="row">
                    <div class="col-4">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="nome" name="nome" placeholder="example" required autofocus>
                            <label for="nome">Nome do Produto</label>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="codigo_barra" name="codigo_barra" placeholder="123456789">
                            <label for="codigo_barra">Código de barras</label>
                        </div>
                    </div>
                    <div class="col-2">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="preco_compra" name="preco_compra" placeholder="0,00">
                            <label for="preco_compra">Preço de custo</label>
                        </div>
                    </div>
                    <div class="col-2">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="preco_venda" name="preco_venda" placeholder="0,00" required>
                            <label for="preco_venda">Preço de venda</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-4">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="unidade" name="unidade" placeholder="example">
                            <label for="unidade">Unidade</label>
                        </div>
                    </div>
                    <div class="col-5">
                        <div class="form-floating mb-3">
                            <textarea class="form-control" id="descricao" name="descricao" placeholder="Descrição..." style="height: 100px"></textarea>
                            <label for="descricao">Descrição</label>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true" checked>
                            <label class="form-check-label" for="ativo">
                                Produto ativo?
                            </label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="button" class="btn btn-success d-flex align-items-center gap-2" id="insert">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Salvar Produto
                        </button>
                    </div>
                </div>
            </form>

</div>
</div>

</div>



{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/product.js"></script>
{% endblock %}

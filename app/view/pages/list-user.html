{% extends "layouts/main.html" %}

{% block title %}Usuários{% endblock %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-4 fw-semibold">
        <i class="fa-solid fa-users me-2 text-warning"></i>
        Lista de Usuários
    </h4>

    <div class="mb-3">
        <button class="btn btn-warning d-flex align-items-center gap-2"
            onclick="api.window.openModal('pages/user', { width: 800, height: 550, title: 'Novo Usuário' })">
            <i class="fa-solid fa-plus"></i>
            Novo Usuário
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <table id="table-users" class="table table-hover align-middle mb-0" style="width: 100%;">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Senha</th>
                        <th>Ativo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
    <script defer type="module" src="file:///{{ assets }}/js/list-user.js"></script>
{% endblock %}

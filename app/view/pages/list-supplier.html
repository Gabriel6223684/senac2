{% extends "layouts/main.html" %}

{% block title %}Fornecedores{% endblock %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-4 fw-semibold">
        <i class="fa-solid fa-truck me-2 text-primary"></i>
        Lista de Fornecedores
    </h4>

    <div class="mb-3">
        <button class="btn btn-primary d-flex align-items-center gap-2"
            onclick="api.window.openModal('pages/supplier', { width: 800, height: 500, title: 'Novo Fornecedor' })">
            <i class="fa-solid fa-plus"></i>
            Novo Fornecedor
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <table id="table-suppliers" class="table table-hover align-middle mb-0" style="width: 100%;">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CNPJ</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
    <script defer type="module" src="file:///{{ assets }}/js/list-supplier.js"></script>
{% endblock %}

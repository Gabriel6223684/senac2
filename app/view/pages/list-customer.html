{% extends "layouts/main.html" %}

{% block title %}Clientes{% endblock %}

{% block content %}
<div class="container mt-4">

    <!-- Título + botão -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 fw-semibold">
            <i class="fa-solid fa-users me-2 text-primary"></i>
            Lista de Clientes
        </h4>

        <button class="btn btn-success d-flex align-items-center gap-2"
            onclick="api.window.openModal('pages/customer', { width: 900, height: 600, title: 'Cadastrar Cliente' })">
            <i class="fa-solid fa-plus"></i>
            Novo cliente
        </button>
    </div>

    <!-- Card da tabela -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <table id="table-customers" class="table table-hover align-middle mb-0" style="width: 100%;">

                <thead class="table-light">
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th style="width: 150px;">Ações</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/list-customer.js"></script>
{% endblock %}

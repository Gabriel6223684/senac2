{% extends "layouts/main.html" %}

{% block title %}DESKIVO — Home{% endblock %}

{% block menu %}
{% include "../partial/header.html" %}
{% endblock %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-4 fw-semibold">
        <i class="fa-solid fa-chart-line me-2 text-primary"></i>
        Painel Principal
    </h4>

    <div class="row g-3">

        <!-- Clientes -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0 h-100 cursor-pointer"
                onclick="api.window.open('pages/list-customer', { title: 'Clientes' })">

                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-primary text-white rounded p-3">
                        <i class="fa-solid fa-users fa-lg"></i>
                    </div>

                    <div>
                        <h6 class="mb-0">Clientes</h6>
                        <small class="text-muted">Gerenciar clientes</small>
                    </div>
                </div>

            </div>
        </div>

        <!-- Novo Cadastro -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0 h-100 cursor-pointer"
                onclick="api.window.openModal('pages/customer', { width: 900, height: 600, title: 'Cadastro' })">

                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-success text-white rounded p-3">
                        <i class="fa-solid fa-user-plus fa-lg"></i>
                    </div>

                    <div>
                        <h6 class="mb-0">Novo Cliente</h6>
                        <small class="text-muted">Cadastrar cliente</small>
                    </div>
                </div>

            </div>
        </div>

    </div>

</div>

<style>
    .cursor-pointer {
        cursor: pointer;
        transition: 0.2s;
    }

    .cursor-pointer:hover {
        transform: translateY(-3px);
    }
</style>
{% endblock %}
